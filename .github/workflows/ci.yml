name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ./shared -r requirements-dev.txt
      - name: Test
        working-directory: shared
        run: pytest -q --cov=shared --cov-report=term --cov-fail-under=80

  services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, order, inventory, shipping, notification]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ./shared
          pip install -r requirements-dev.txt
          pip install -r services/${{ matrix.service }}/requirements.txt
      - name: Test
        working-directory: services/${{ matrix.service }}
        run: pytest -q --cov=app --cov-report=term --cov-fail-under=80
